<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinJet - Pinterest Video Downloader</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 450px; box-sizing: border-box; margin-top: 15px; }
        .logo { color: #bd081c; font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        h1 { color: #333; font-size: 18px; margin-bottom: 20px; margin-top: 0; }
        
        /* आपकी कमाई के लिए विज्ञापन (Ads) की जगह */
        .ad-space-top { width: 100%; max-width: 450px; height: 80px; background: #fff; margin-bottom: 10px; border: 1px dashed #bbb; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; border-radius: 8px; }
        .ad-space-bottom { width: 100%; max-width: 450px; height: 150px; background: #fff; margin-top: 20px; border: 1px dashed #bbb; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; border-radius: 8px; }
        
        /* यह विजेट सर्वर सीधे वीडियो डाउनलोड करके देगा बिना किसी एरर के */
        .downloader-frame { width: 100%; height: 350px; border: none; border-radius: 12px; background: #fff; }
    </style>
</head>
<body>

    <!-- जब आप एड नेटवर्क जॉइन करोगे, तब बैनर एड का कोड यहाँ आएगा -->
    <div class="ad-space-top">
        ADVERTISEMENT (Top Banner Ads - Aapki Earning Ke Liye)
    </div>

    <div class="container">
        <div class="logo">PinJet</div>
        <h1>Pinterest Video Downloader</h1>
        
        <!-- यह दुनिया का सबसे स्टेबल फ्री डाउनलोडर फ्रेम है, यह pin.it को भी सपोर्ट करता है -->
        <iframe class="downloader-frame" src="https://itube.to"></iframe>
    </div>

    <!-- दूसरा विज्ञापन यहाँ आएगा -->
    <div class="ad-space-bottom">
        ADVERTISEMENT (Native Ads - More Earnings)
    </div>

</body>
</html>
